stryker4s {
  # Relative to the pills subproject's base-dir, not the repo root.
  mutate = ["src/main/scala/**/*.scala"]

  reporters = ["console", "html"]

  # Default (5s) times out on the initial baseline run before per-test timings exist -
  # cold JVM start across 3 test-runners plus the full suite easily exceeds it.
  timeout = 60 seconds

  # Required: the default (non-legacy) test runner's initial run is unreliable on this
  # project's mixed ScalaTest + ZIO Test setup (a second, spurious initial run fires with a
  # reduced suite subset and reports a false failure, aborting before any mutants run). The
  # legacy runner forks a plain `sbt test` per mutant instead - slower, but correct. Forking a
  # fresh sbt process per mutant also needs more heap than sbt's 1GB default - see the repo
  # root's `.jvmopts` (-Xmx4096m), which sbt picks up automatically for every forked process.
  legacy-test-runner = true

  thresholds {
    high  = 80
    low   = 60
    break = 0   # report-only until a baseline mutation score exists
  }
}
